name: Milestone Assignment Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, milestoned, demilestoned]

permissions:
  pull-requests: write
  checks: write

jobs:
  check-milestone:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for auto-label workflow
        run: sleep 5
        if: github.event.action == 'opened'

      - name: Check and assign milestone
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number
            });

            let hasMilestone = pr.milestone !== null;
            let milestoneTitle = hasMilestone ? pr.milestone.title : null;

            // If no milestone, assign Foundation (Milestone 1) as default
            if (!hasMilestone) {
              try {
                // Get milestone ID for "1 - Foundation"
                const { data: milestones } = await github.rest.issues.listMilestones({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open'
                });

                const foundationMilestone = milestones.find(m =>
                  m.title.includes('Foundation') || m.title.includes('1')
                );

                if (foundationMilestone) {
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: context.payload.pull_request.number,
                    milestone: foundationMilestone.number
                  });
                  hasMilestone = true;
                  milestoneTitle = foundationMilestone.title;
                  console.log(`Assigned default milestone: ${milestoneTitle}`);
                }
              } catch (error) {
                console.warn(`Could not assign default milestone: ${error.message}`);
              }
            }

            // Create check run
            const { data: check } = await github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Milestone Assignment',
              head_sha: context.payload.pull_request.head.sha,
              status: 'completed',
              conclusion: hasMilestone ? 'success' : 'failure',
              output: {
                title: hasMilestone ? 'Milestone Assigned' : 'No Milestone Assigned',
                summary: hasMilestone
                  ? `This PR is assigned to milestone: ${milestoneTitle}`
                  : 'This PR must be assigned to a milestone before merging. Create a milestone or allow the auto-label workflow to assign one.'
              }
            });

            if (!hasMilestone) {
              core.setFailed('PR must have a milestone assigned');
            }
