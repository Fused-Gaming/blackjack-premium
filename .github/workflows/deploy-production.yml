name: Deploy Production Build

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'vite.config.ts'
      - 'vercel.json'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '24'

permissions:
  contents: read

jobs:
  build-production:
    name: Build Production Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.x --activate

      - name: Get pnpm cache directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run type-check

      - name: Run linter
        run: pnpm run lint

      - name: Build production
        run: pnpm run build

      - name: Verify build
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not created"
            exit 1
          fi
          if [ ! -f "dist/index.html" ]; then
            echo "❌ Build failed - index.html not found"
            exit 1
          fi
          echo "✅ Production build verified successfully"
          echo "Build artifacts:"
          du -sh dist/
          find dist -type f -name "*.html" -o -name "*.js" -o -name "*.css" | wc -l
          echo "files in build"

      - name: Generate build metadata
        run: |
          cat > dist/.build-info.txt << EOF
          Build: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Date: $(date -u +'%Y-%m-%d %H:%M:%SZ')
          Actor: ${{ github.actor }}
          Workflow: deploy-production
          EOF
          cat dist/.build-info.txt

      - name: Create deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-build
          path: dist/
          retention-days: 30

  notify-deployment:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: build-production
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.build-production.result }}" = "success" ]; then
            echo "✅ Production build succeeded"
            echo "📦 Artifact: production-build"
            echo "🚀 Vercel will automatically deploy from main branch"
            echo "🌐 URL: https://demo.vln.gg/"
          else
            echo "❌ Production build failed"
            exit 1
          fi
