name: NPM Install & Build Validation

on:
  push:
    branches:
      - main
      - staging
      - 'feat/**'
      - 'feature/**'
      - 'fix/**'
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/npm-install.yml'
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read

jobs:
  install-and-build:
    name: Install Dependencies & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['24.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        env:
          CI: true

      - name: Verify lock file is up to date
        run: |
          if ! pnpm install --dry-run --frozen-lockfile > /dev/null 2>&1; then
            echo "❌ pnpm-lock.yaml is out of date!"
            echo "Run: pnpm install --fix-lockfile"
            exit 1
          fi
          echo "✅ Lock file is up to date"

      - name: Check TypeScript
        run: pnpm run type-check

      - name: Run linter
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test
        continue-on-error: true

      - name: Build project
        run: pnpm run build

      - name: Verify build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not created"
            exit 1
          fi
          echo "✅ Build successful - dist directory created"
          ls -lh dist/ | head -20

  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security audit
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

  lockfile-validation:
    name: Lock File Integrity
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate lock file format
        run: |
          if ! grep -q "lockfileVersion:" pnpm-lock.yaml; then
            echo "❌ Invalid pnpm lock file format"
            exit 1
          fi

          if ! grep -q "packages:" pnpm-lock.yaml; then
            echo "❌ Lock file missing packages section"
            exit 1
          fi

          echo "✅ Lock file format is valid"

      - name: Check for merge conflicts
        run: |
          if grep -q "<<<<<<< HEAD" pnpm-lock.yaml; then
            echo "❌ Lock file contains merge conflicts"
            exit 1
          fi
          echo "✅ No merge conflicts in lock file"

  report:
    name: Summary
    runs-on: ubuntu-latest
    needs: [install-and-build, lockfile-validation]
    if: always()

    steps:
      - name: Check build status
        run: |
          if [ "${{ needs.install-and-build.result }}" == "success" ] && \
             [ "${{ needs.lockfile-validation.result }}" == "success" ]; then
            echo "✅ All checks passed!"
            echo "- Dependencies installed successfully"
            echo "- Lock file is valid"
            echo "- Build completed"
            echo "- Tests executed"
            exit 0
          else
            echo "❌ Some checks failed. See above for details."
            exit 1
          fi
