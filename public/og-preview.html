<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Canonical Link -->
    <link rel="canonical" href="https://demo.vln.gg/" />

    <!-- Primary Meta -->
    <title>ACE — Premium Blackjack</title>
    <meta name="description" content="The premium provably-fair blackjack experience. Connect your wallet, place your bets, and play with full cryptographic transparency." />
    <meta name="theme-color" content="#050A0F" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph - Optimized for Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ACE Premium Blackjack" />
    <meta property="og:title" content="ACE — Premium Blackjack" />
    <meta property="og:description" content="Experience premium provably-fair blackjack with cryptographic transparency. Connect your wallet and start playing now." />

    <!-- OG Image - 1200x630 optimized for all platforms -->
    <meta property="og:image" content="https://demo.vln.gg/social/og-vln-demo.svg" />
    <meta property="og:image:secure_url" content="https://demo.vln.gg/social/og-vln-demo.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ACE Premium Blackjack — Dark premium card game interface with amber accents" />
    <meta property="og:image:type" content="image/svg+xml" />

    <!-- OG URL -->
    <meta property="og:url" content="https://demo.vln.gg/" />

    <!-- Twitter Card - Enhanced for Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aceblackjack" />
    <meta name="twitter:creator" content="@aceblackjack" />
    <meta name="twitter:title" content="ACE — Premium Blackjack" />
    <meta name="twitter:description" content="Premium provably-fair blackjack. Connect your wallet and play with full transparency." />
    <meta name="twitter:image" content="https://demo.vln.gg/social/og-vln-demo.svg" />
    <meta name="twitter:image:alt" content="ACE Premium Blackjack Interface" />

    <!-- Facebook Specific -->
    <meta property="fb:app_id" content="" />

    <!-- Apple Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ACE" />

    <!-- Other Meta -->
    <meta name="application-name" content="ACE" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <!-- Redirect to main app -->
    <script>
      // Redirect to the main landing page after a brief delay
      // This allows crawlers to read the OG meta tags before redirecting
      window.location.href = '/';
    </script>
  </head>
  <body>
    <!-- OG Preview Container for crawlers -->
    <noscript>
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #050A0F; padding: 2rem;">
        <img src="/social/og-vln-demo.svg" alt="ACE Premium Blackjack" style="max-width: 100%; height: auto;" />
        <h1 style="color: #F59E0B; font-family: 'Outfit', sans-serif; margin-top: 2rem;">ACE Premium Blackjack</h1>
        <p style="color: #E2E8F0; font-family: 'Inter', sans-serif; text-align: center; max-width: 500px;">
          Experience premium provably-fair blackjack with cryptographic transparency.
        </p>
        <a href="/" style="color: #F59E0B; margin-top: 2rem; text-decoration: none; border: 2px solid #F59E0B; padding: 1rem 2rem; border-radius: 12px;">
          Enter Game →
        </a>
      </div>
    </noscript>
  </body>
</html>
