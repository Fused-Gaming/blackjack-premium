<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 140" width="100" height="140">
  <!-- card body -->
  <rect width="100" height="140" rx="6" fill="white"/>
  <rect x="0.5" y="0.5" width="99" height="139" rx="5.5" fill="none" stroke="#D1D5DB" stroke-width="1"/>

  <!-- top-left corner -->
  <text x="6.5" y="17" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#111827">K</text>
  <text x="6.5" y="29" font-family="Georgia,serif" font-size="11" fill="#111827">♠</text>

  <!-- center artwork -->
  <!-- face card artwork -->
  <rect x="18" y="22" width="64" height="96" rx="4" fill="none" stroke="#111827" stroke-width="0.75" opacity="0.18"/>
  <text x="50" y="72" font-family="Georgia,serif" font-size="38" fill="#111827" text-anchor="middle" dominant-baseline="central" opacity="0.88">♠</text>
  <text x="50" y="100" font-family="Georgia,serif" font-size="15" font-weight="bold" fill="#111827" text-anchor="middle" dominant-baseline="central" opacity="0.28">K</text>

  <!-- bottom-right corner (rotated 180° around card center) -->
  <g transform="rotate(180,50,70)">
    <text x="6.5" y="17" font-family="Georgia,serif" font-size="14" font-weight="bold" fill="#111827">K</text>
    <text x="6.5" y="29" font-family="Georgia,serif" font-size="11" fill="#111827">♠</text>
  </g>
</svg>