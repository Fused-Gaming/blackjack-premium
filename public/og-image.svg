<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050A0F"/>
      <stop offset="100%" stop-color="#0D1B2A"/>
    </linearGradient>
    <linearGradient id="felt" cx="50%" cy="50%" r="50%" fx="50%" fy="40%" gradientUnits="objectBoundingBox" id="feltGrad">
      <stop offset="0%" stop-color="#0F5132"/>
      <stop offset="100%" stop-color="#073520"/>
    </linearGradient>
    <radialGradient id="tableGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0F5132" stop-opacity="1"/>
      <stop offset="100%" stop-color="#073520" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1E3A5F" stroke-width="0.5" opacity="0.4"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1E3A5F" stroke-width="0.5" opacity="0.4"/>

  <!-- Table oval -->
  <ellipse cx="600" cy="340" rx="440" ry="240" fill="url(#tableGlow)" stroke="#1A6B54" stroke-width="3"/>
  <ellipse cx="600" cy="340" rx="420" ry="220" fill="none" stroke="#0F5132" stroke-width="1" opacity="0.5"/>

  <!-- Table inner rim -->
  <ellipse cx="600" cy="340" rx="430" ry="230" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.15"/>

  <!-- Dealer cards (top area) -->
  <!-- Card 1 - face up A♠ -->
  <g transform="translate(490, 220)" filter="url(#cardShadow)">
    <rect width="80" height="110" rx="8" fill="white"/>
    <text x="8" y="22" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#111">A</text>
    <text x="8" y="38" font-family="Georgia,serif" font-size="16" fill="#111">♠</text>
    <text x="40" y="65" font-family="Georgia,serif" font-size="36" fill="#111" text-anchor="middle">♠</text>
    <text x="72" y="102" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#111" text-anchor="end" transform="rotate(180,40,95)">A</text>
  </g>

  <!-- Card 2 - face up K♥ -->
  <g transform="translate(580, 215)" filter="url(#cardShadow)">
    <rect width="80" height="110" rx="8" fill="white"/>
    <text x="8" y="22" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#DC2626">K</text>
    <text x="8" y="38" font-family="Georgia,serif" font-size="16" fill="#DC2626">♥</text>
    <text x="40" y="65" font-family="Georgia,serif" font-size="36" fill="#DC2626" text-anchor="middle">♥</text>
  </g>

  <!-- Player cards (bottom area) -->
  <!-- Card 1 - 7♦ -->
  <g transform="translate(490, 370)" filter="url(#cardShadow)">
    <rect width="80" height="110" rx="8" fill="white"/>
    <text x="8" y="22" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#DC2626">7</text>
    <text x="8" y="38" font-family="Georgia,serif" font-size="16" fill="#DC2626">♦</text>
    <text x="40" y="65" font-family="Georgia,serif" font-size="36" fill="#DC2626" text-anchor="middle">♦</text>
  </g>

  <!-- Card 2 - 4♣ -->
  <g transform="translate(580, 365)" filter="url(#cardShadow)">
    <rect width="80" height="110" rx="8" fill="white"/>
    <text x="8" y="22" font-family="Georgia,serif" font-size="18" font-weight="bold" fill="#111">4</text>
    <text x="8" y="38" font-family="Georgia,serif" font-size="16" fill="#111">♣</text>
    <text x="40" y="65" font-family="Georgia,serif" font-size="36" fill="#111" text-anchor="middle">♣</text>
  </g>

  <!-- Betting ring -->
  <circle cx="600" cy="345" r="38" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="6 4" opacity="0.4"/>

  <!-- Chip stack -->
  <ellipse cx="600" cy="358" rx="22" ry="6" fill="#1a1a1a" opacity="0.4"/>
  <circle cx="600" cy="350" r="20" fill="#10B981" stroke="#FFD700" stroke-width="2"/>
  <circle cx="600" cy="350" r="14" fill="none" stroke="white" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>
  <text x="600" y="354" font-family="Inter,sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="bold">25</text>

  <!-- Left section: Brand -->
  <text x="100" y="160" font-family="Outfit,Inter,sans-serif" font-size="18" fill="#F59E0B" font-weight="700" letter-spacing="4" opacity="0.8">PREMIUM BLACKJACK</text>

  <!-- ACE logo mark -->
  <text x="80" y="260" font-family="Georgia,serif" font-size="72" fill="url(#gold)" filter="url(#glow)" opacity="0.9">♠</text>
  <text x="160" y="260" font-family="Outfit,Inter,sans-serif" font-size="96" fill="url(#gold)" font-weight="900" letter-spacing="-4">ACE</text>

  <!-- Tagline -->
  <text x="100" y="310" font-family="Inter,sans-serif" font-size="20" fill="#94A3B8" font-weight="400">Provably fair · Connect your wallet · Play</text>

  <!-- Stats row -->
  <rect x="100" y="370" width="300" height="1" fill="#1E3A5F"/>

  <text x="100" y="405" font-family="Inter,sans-serif" font-size="14" fill="#64748B">3:2 Blackjack Payout</text>
  <text x="100" y="425" font-family="Inter,sans-serif" font-size="14" fill="#64748B">Cryptographically Verified RNG</text>
  <text x="100" y="445" font-family="Inter,sans-serif" font-size="14" fill="#64748B">Multi-wallet · Web3 Native</text>

  <!-- Right section: "Blackjack!" callout -->
  <rect x="870" y="240" width="230" height="70" rx="12" fill="#10B981" opacity="0.15"/>
  <rect x="870" y="240" width="230" height="70" rx="12" fill="none" stroke="#10B981" stroke-width="1" opacity="0.4"/>
  <text x="985" y="268" font-family="Outfit,sans-serif" font-size="14" fill="#10B981" text-anchor="middle" font-weight="700" letter-spacing="2">BLACKJACK!</text>
  <text x="985" y="292" font-family="Outfit,sans-serif" font-size="24" fill="#10B981" text-anchor="middle" font-weight="800">3 : 2</text>

  <!-- Bottom border decoration -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#gold)" opacity="0.15"/>

  <!-- Corner spades decoration -->
  <text x="30" y="60" font-family="Georgia,serif" font-size="32" fill="#1E3A5F" opacity="0.6">♠</text>
  <text x="1130" y="60" font-family="Georgia,serif" font-size="32" fill="#1E3A5F" opacity="0.6">♠</text>
  <text x="30" y="610" font-family="Georgia,serif" font-size="32" fill="#1E3A5F" opacity="0.6">♠</text>
  <text x="1130" y="610" font-family="Georgia,serif" font-size="32" fill="#1E3A5F" opacity="0.6">♠</text>
</svg>
