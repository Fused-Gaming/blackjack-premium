<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ACE Premium Blackjack">
  <defs>
    <!-- Background Glow -->
    <radialGradient id="bgGlow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#1A1410"/>
      <stop offset="50%" stop-color="#050A0F"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Premium Gold Gradient (more contrast) -->
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF6CC"/>
      <stop offset="20%" stop-color="#FBBF24"/>
      <stop offset="45%" stop-color="#D79210"/>
      <stop offset="75%" stop-color="#FFE08A"/>
      <stop offset="100%" stop-color="#A96500"/>
    </linearGradient>

    <!-- Inner Glow -->
    <radialGradient id="goldInner" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF2B8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D79210" stop-opacity="0.2"/>
    </radialGradient>

    <!-- Strong Glow -->
    <filter id="goldGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle Noise Texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0 0.04"/>
      </feComponentTransfer>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGlow)"/>

  <!-- Card -->
  <g transform="translate(600 315)">

    <!-- Shadow -->
    <ellipse cx="0" cy="210" rx="260" ry="36" fill="#000" opacity="0.45"/>

    <!-- Card Body -->
    <rect x="-160" y="-240" width="320" height="460" rx="28"
          fill="#0B0F14" stroke="url(#gold)" stroke-width="3"/>

    <!-- Inner Border Glow -->
    <rect x="-148" y="-228" width="296" height="436" rx="22"
          fill="none" stroke="url(#goldInner)" stroke-width="1.2" opacity="0.6"/>

    <!-- Corner Details -->
    <g stroke="url(#gold)" stroke-width="1.8" fill="none" opacity="0.9">
      <path d="M-140 -210 h30 M-140 -210 v30"/>
      <path d="M140 -210 h-30 M140 -210 v30"/>
      <path d="M-140 190 h30 M-140 190 v-30"/>
      <path d="M140 190 h-30 M140 190 v-30"/>
    </g>

    <!-- Spade -->
    <g filter="url(#goldGlow)">
      <text x="0" y="-40" text-anchor="middle"
            font-family="Georgia, serif"
            font-size="140" font-weight="700"
            fill="url(#gold)">♠</text>
    </g>

    <!-- ACE -->
    <text x="0" y="70" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="64" font-weight="900"
          letter-spacing="12"
          fill="url(#gold)">ACE</text>

    <!-- BLACKJACK -->
    <text x="0" y="120" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="26" font-weight="700"
          letter-spacing="10"
          fill="#F8D981">BLACKJACK</text>

    <!-- Premium Line -->
    <g>
      <line x1="-90" y1="150" x2="-30" y2="150" stroke="url(#gold)" stroke-width="1.5"/>
      <text x="0" y="155" text-anchor="middle"
            font-family="Inter, sans-serif"
            font-size="18" font-weight="800"
            letter-spacing="6"
            fill="#FBBF24">PREMIUM</text>
      <line x1="30" y1="150" x2="90" y2="150" stroke="url(#gold)" stroke-width="1.5"/>
    </g>

  </g>

  <!-- Grain Overlay -->
  <rect width="1200" height="630" filter="url(#noise)" opacity="0.15"/>
</svg>
