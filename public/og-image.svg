<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bgGradient" cx="50%" cy="40%">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>

    <!-- Gold gradient for card border and elements -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </linearGradient>

    <!-- Glow effect for spade -->
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow -->
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Centered card frame container -->
  <g transform="translate(300, 65)" filter="url(#cardShadow)">
    <!-- Card background - dark with subtle gradient -->
    <defs>
      <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#0d0d0d"/>
        <stop offset="50%" stop-color="#0a0a0a"/>
        <stop offset="100%" stop-color="#1a1520"/>
      </linearGradient>
    </defs>

    <!-- Main card background -->
    <rect x="0" y="0" width="600" height="500" rx="40" ry="40" fill="url(#cardBg)"/>

    <!-- Card outer border - gold with glow -->
    <rect x="0" y="0" width="600" height="500" rx="40" ry="40" fill="none" stroke="url(#goldGradient)" stroke-width="5" filter="url(#glowFilter)"/>

    <!-- Card inner border - subtle gold highlight -->
    <rect x="10" y="10" width="580" height="480" rx="35" ry="35" fill="none" stroke="url(#goldGradient)" stroke-width="1" opacity="0.4"/>

    <!-- Corner decorations - top-left -->
    <g opacity="0.6">
      <circle cx="40" cy="40" r="8" fill="url(#goldGradient)"/>
      <path d="M 20 40 L 35 25 L 40 40" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Corner decorations - top-right -->
    <g opacity="0.6" transform="translate(600, 0) scale(-1, 1)">
      <circle cx="40" cy="40" r="8" fill="url(#goldGradient)"/>
      <path d="M 20 40 L 35 25 L 40 40" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Corner decorations - bottom-left -->
    <g opacity="0.6" transform="translate(0, 500) scale(1, -1)">
      <circle cx="40" cy="40" r="8" fill="url(#goldGradient)"/>
      <path d="M 20 40 L 35 25 L 40 40" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Corner decorations - bottom-right -->
    <g opacity="0.6" transform="translate(600, 500) scale(-1, -1)">
      <circle cx="40" cy="40" r="8" fill="url(#goldGradient)"/>
      <path d="M 20 40 L 35 25 L 40 40" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>

    <!-- Subtle card back pattern - horizontal lines -->
    <g opacity="0.08" stroke="url(#goldGradient)" stroke-width="1.5">
      <line x1="50" y1="50" x2="550" y2="50"/>
      <line x1="50" y1="100" x2="550" y2="100"/>
      <line x1="50" y1="150" x2="550" y2="150"/>
      <line x1="50" y1="200" x2="550" y2="200"/>
      <line x1="50" y1="250" x2="550" y2="250"/>
      <line x1="50" y1="300" x2="550" y2="300"/>
      <line x1="50" y1="350" x2="550" y2="350"/>
      <line x1="50" y1="400" x2="550" y2="400"/>
      <line x1="50" y1="450" x2="550" y2="450"/>
    </g>

    <!-- Large golden spade symbol - centered -->
    <text x="300" y="220" font-family="Georgia, serif" font-size="180" fill="url(#goldGradient)" text-anchor="middle" font-weight="bold" filter="url(#glowFilter)">♠</text>

    <!-- ACE text -->
    <text x="300" y="320" font-family="'Outfit', 'Inter', sans-serif" font-size="72" fill="url(#goldGradient)" text-anchor="middle" font-weight="900" letter-spacing="6">ACE</text>

    <!-- BLACKJACK text -->
    <text x="300" y="370" font-family="'Outfit', 'Inter', sans-serif" font-size="40" fill="url(#goldGradient)" text-anchor="middle" font-weight="700" letter-spacing="3" opacity="0.9">BLACKJACK</text>

    <!-- PREMIUM text with decorative lines -->
    <line x1="180" y1="395" x2="260" y2="395" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>
    <text x="300" y="410" font-family="'Outfit', 'Inter', sans-serif" font-size="28" fill="url(#goldGradient)" text-anchor="middle" font-weight="600" letter-spacing="3">PREMIUM</text>
    <line x1="340" y1="395" x2="420" y2="395" stroke="url(#goldGradient)" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Bottom gradient overlay for depth -->
  <defs>
    <linearGradient id="bottomGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bottomGradient)"/>
</svg>
