<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#165B33"/>

  <!-- Table Felt (Ellipse) -->
  <ellipse cx="600" cy="450" rx="450" ry="280" fill="#0F4D2B" opacity="0.9"/>
  <ellipse cx="600" cy="450" rx="450" ry="280" fill="none" stroke="#D4AF37" stroke-width="2" opacity="0.6"/>

  <!-- Dealer Area (Top) -->
  <g id="dealer">
    <circle cx="600" cy="150" r="60" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="600" y="160" text-anchor="middle" fill="#D4AF37" font-size="16" font-weight="bold">Dealer</text>
  </g>

  <!-- Player Seats (5 seats around the table) -->
  <!-- Seat 1 (Bottom Center) -->
  <g id="seat1">
    <rect x="560" y="680" width="80" height="60" rx="5" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="600" y="705" text-anchor="middle" fill="#D4AF37" font-size="12">Seat 1</text>
    <circle cx="600" cy="735" r="8" fill="#D4AF37" opacity="0.5"/>
  </g>

  <!-- Seat 2 (Bottom Right) -->
  <g id="seat2">
    <rect x="820" y="600" width="80" height="60" rx="5" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="860" y="625" text-anchor="middle" fill="#D4AF37" font-size="12">Seat 2</text>
    <circle cx="860" cy="660" r="8" fill="#D4AF37" opacity="0.5"/>
  </g>

  <!-- Seat 3 (Right) -->
  <g id="seat3">
    <rect x="950" y="410" width="60" height="80" rx="5" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="985" y="440" text-anchor="middle" fill="#D4AF37" font-size="12">Seat 3</text>
    <circle cx="1010" cy="455" r="8" fill="#D4AF37" opacity="0.5"/>
  </g>

  <!-- Seat 4 (Top Right) -->
  <g id="seat4">
    <rect x="820" y="100" width="80" height="60" rx="5" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="860" y="125" text-anchor="middle" fill="#D4AF37" font-size="12">Seat 4</text>
    <circle cx="860" cy="70" r="8" fill="#D4AF37" opacity="0.5"/>
  </g>

  <!-- Seat 5 (Left) -->
  <g id="seat5">
    <rect x="190" y="410" width="60" height="80" rx="5" fill="#1a7a3e" stroke="#D4AF37" stroke-width="2"/>
    <text x="225" y="440" text-anchor="middle" fill="#D4AF37" font-size="12">Seat 5</text>
    <circle cx="190" cy="455" r="8" fill="#D4AF37" opacity="0.5"/>
  </g>

  <!-- Betting Areas -->
  <g id="betting-areas">
    <!-- Betting spot 1 -->
    <rect x="580" y="550" width="40" height="40" rx="3" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,5"/>
    <!-- Betting spot 2 -->
    <rect x="780" y="480" width="40" height="40" rx="3" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,5"/>
    <!-- Betting spot 3 -->
    <rect x="880" y="360" width="40" height="40" rx="3" fill="none" stroke="#D4AF37" stroke-width="1.5" stroke-dasharray="5,5"/>
  </g>

  <!-- Insurance Line -->
  <line x1="450" y1="150" x2="750" y2="150" stroke="#EF4444" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <text x="600" y="140" text-anchor="middle" fill="#EF4444" font-size="10">Insurance 2:1</text>

  <!-- Rules Text -->
  <text x="600" y="350" text-anchor="middle" fill="#D4AF37" font-size="11" opacity="0.7">Dealer Stands on 17</text>

  <!-- Decorative Elements -->
  <circle cx="200" cy="200" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="1000" cy="200" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="200" cy="700" r="3" fill="#D4AF37" opacity="0.3"/>
  <circle cx="1000" cy="700" r="3" fill="#D4AF37" opacity="0.3"/>
</svg>
