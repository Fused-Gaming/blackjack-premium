<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ACE — Premium Blackjack. Provably Fair. Cryptographically Verified.</title>
  <desc id="desc">Premium provably-fair blackjack where every hand is verifiable, every shuffle transparent, and every outcome auditable. No server manipulation. 100% cryptographic fairness.</desc>

  <defs>
    <!-- Dark gradient background matching design tokens -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A0F" />
      <stop offset="1" stop-color="#0B1116" />
    </linearGradient>

    <!-- Golden accent matching design tokens -->
    <linearGradient id="goldAccent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F59E0B" />
      <stop offset="1" stop-color="#D97706" />
    </linearGradient>

    <!-- Cyan accent for fairness -->
    <linearGradient id="cyanAccent" x1="0" y1="0" x2="600" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#06B6D4" />
      <stop offset="1" stop-color="#00D9FF" />
    </linearGradient>

    <!-- Glow effect -->
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(900 300) rotate(90) scale(250 350)">
      <stop stop-color="#F59E0B" stop-opacity="0.25" />
      <stop offset="1" stop-color="#F59E0B" stop-opacity="0" />
    </radialGradient>

    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Subtle grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M0,0 L60,0 M0,0 L0,60" stroke="#1F2937" stroke-width="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#grid)" />
  <rect width="1200" height="630" fill="url(#glow)" />

  <!-- Main Content Container -->
  <g filter="url(#shadow)">
    <!-- ACE Logo/Title -->
    <text x="60" y="140" fill="#F59E0B" font-size="96" font-family="Outfit, sans-serif" font-weight="900" letter-spacing="-2">ACE</text>

    <!-- Subtitle -->
    <text x="60" y="210" fill="#FFFFFF" font-size="52" font-family="Inter, sans-serif" font-weight="700" letter-spacing="-0.5">Premium Blackjack</text>

    <!-- Key messaging -->
    <text x="60" y="270" fill="url(#cyanAccent)" font-size="40" font-family="Inter, sans-serif" font-weight="600">Provably Fair</text>
    <text x="60" y="320" fill="url(#cyanAccent)" font-size="40" font-family="Inter, sans-serif" font-weight="600">Cryptographically Verified</text>
  </g>

  <!-- Divider line -->
  <line x1="60" y1="360" x2="540" y2="360" stroke="url(#goldAccent)" stroke-width="3" stroke-linecap="round" />

  <!-- Trust messaging -->
  <g filter="url(#shadow)">
    <text x="60" y="410" fill="#E5E7EB" font-size="32" font-family="Inter, sans-serif" font-weight="500">Every hand auditable</text>
    <text x="60" y="455" fill="#E5E7EB" font-size="32" font-family="Inter, sans-serif" font-weight="500">Every shuffle transparent</text>
    <text x="60" y="500" fill="#E5E7EB" font-size="32" font-family="Inter, sans-serif" font-weight="500">Zero server manipulation</text>
  </g>

  <!-- Right side: Card showcase -->
  <g filter="url(#shadow)">
    <!-- Ace of Spades -->
    <g transform="translate(750, 100)">
      <rect width="200" height="280" rx="20" fill="#FFFFFF" />
      <rect width="200" height="280" rx="20" fill="#FFFFFF" stroke="#F59E0B" stroke-width="3" />

      <!-- Card content -->
      <text x="20" y="50" fill="#000000" font-size="72" font-family="Outfit, sans-serif" font-weight="900">A</text>
      <text x="20" y="110" fill="#000000" font-size="48" font-family="Georgia, serif" font-weight="bold">♠</text>

      <!-- Center: Spade symbol -->
      <text x="100" y="170" text-anchor="middle" fill="#000000" font-size="80" font-family="Georgia, serif">♠</text>

      <!-- Bottom (rotated) -->
      <text x="180" y="250" text-anchor="end" fill="#000000" font-size="72" font-family="Outfit, sans-serif" font-weight="900" transform="rotate(180 180 250)">A</text>
    </g>

    <!-- Verification badge -->
    <g transform="translate(750, 420)">
      <rect width="200" height="80" rx="12" fill="#10B981" fill-opacity="0.15" stroke="#10B981" stroke-width="2" />
      <text x="100" y="35" text-anchor="middle" fill="#10B981" font-size="24" font-family="Inter, sans-serif" font-weight="700">✓ VERIFIED</text>
      <text x="100" y="60" text-anchor="middle" fill="#6EE7B7" font-size="14" font-family="Inter, sans-serif" font-weight="500">Cryptographically Fair</text>
    </g>
  </g>

  <!-- Bottom branding -->
  <text x="1200" y="615" text-anchor="end" fill="#6B7280" font-size="12" font-family="Inter, sans-serif" font-weight="500">demo.vln.gg</text>
</svg>