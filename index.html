<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://demo.vln.gg/" />

    <!-- Primary Meta -->
    <title>ACE — Premium Blackjack</title>
    <meta name="description" content="The premium provably-fair blackjack experience. Connect your wallet, place your bets, and play with full cryptographic transparency." />
    <meta name="theme-color" content="#050A0F" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph - Optimized for Social Sharing -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ACE Premium Blackjack" />
    <meta property="og:title" content="ACE — Premium Blackjack" />
    <meta property="og:description" content="Experience premium provably-fair blackjack with cryptographic transparency. Connect your wallet and start playing now." />

    <!-- OG Image - 1200x630 dynamically generated for all platforms -->
    <meta property="og:image" content="https://demo.vln.gg/api/og-image" />
    <meta property="og:image:secure_url" content="https://demo.vln.gg/api/og-image" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="ACE Premium Blackjack — Dark premium card game interface with amber accents" />
    <meta property="og:image:type" content="image/svg+xml" />

    <!-- OG URL -->
    <meta property="og:url" content="https://demo.vln.gg/" />

    <!-- Twitter Card - Enhanced for Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@aceblackjack" />
    <meta name="twitter:creator" content="@aceblackjack" />
    <meta name="twitter:title" content="ACE — Premium Blackjack" />
    <meta name="twitter:description" content="Premium provably-fair blackjack. Connect your wallet and play with full transparency." />
    <meta name="twitter:image" content="https://demo.vln.gg/api/og-image" />
    <meta name="twitter:image:alt" content="ACE Premium Blackjack Interface" />

    <!-- Telegram Sharing Tags -->
    <meta property="telegram:title" content="ACE — Premium Blackjack" />
    <meta property="telegram:description" content="Premium provably-fair blackjack with full cryptographic transparency. Connect your wallet and start playing now." />
    <meta property="telegram:image" content="https://demo.vln.gg/api/og-image" />

    <!-- Facebook Specific -->
    <meta property="fb:app_id" content="" />

    <!-- Apple Specific -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ACE" />

    <!-- Other Meta -->
    <meta name="application-name" content="ACE" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org/",
        "@type": "VideoGame",
        "name": "ACE — Premium Blackjack",
        "description": "The premium provably-fair blackjack experience. Connect your wallet, place your bets, and play with full cryptographic transparency.",
        "image": "https://ace-blackjack.example/og-image.svg",
        "applicationCategory": "GamesApp",
        "gamePlayMode": ["SinglePlayer", "MultiPlayer"],
        "inLanguage": "en",
        "isAccessibleForFree": true,
        "offers": {
          "@type": "Offer",
          "priceCurrency": "USD",
          "price": "0",
          "availability": "https://schema.org/InStock"
        },
        "author": {
          "@type": "Organization",
          "name": "ACE Games"
        },
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "120",
          "bestRating": "5",
          "worstRating": "1"
        }
      }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
