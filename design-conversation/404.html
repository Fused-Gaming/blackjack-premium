<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | ACE Blackjack Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Georgia', serif;
            background: linear-gradient(135deg, #050a0f 0%, #0f1419 50%, #1a1f24 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            padding: 2rem;
            max-width: 700px;
            width: 100%;
            text-align: center;
            animation: fadeInPage 1.2s ease-out;
        }

        @keyframes fadeInPage {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-code-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            animation: errorCodeFloatIn 1.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes errorCodeFloatIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-30px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            letter-spacing: -3px;
            animation: codeShake 0.6s ease-in-out infinite;
        }

        @keyframes codeShake {
            0%, 100% {
                transform: translateX(0) rotateZ(0deg);
            }
            25% {
                transform: translateX(-4px) rotateZ(-1deg);
            }
            75% {
                transform: translateX(4px) rotateZ(1deg);
            }
        }

        .error-code:hover {
            animation: codeShakeIntense 0.4s ease-in-out;
        }

        @keyframes codeShakeIntense {
            0%, 100% {
                transform: translateX(0) rotateZ(0deg);
            }
            25% {
                transform: translateX(-8px) rotateZ(-2deg);
            }
            50% {
                transform: translateX(8px) rotateZ(2deg);
            }
            75% {
                transform: translateX(-8px) rotateZ(-2deg);
            }
        }

        .card-icon {
            font-size: 80px;
            line-height: 1;
            animation: cardFlip 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(245, 158, 11, 0.3));
        }

        @keyframes cardFlip {
            0% {
                transform: perspective(1000px) rotateY(0deg);
                opacity: 1;
            }
            45% {
                transform: perspective(1000px) rotateY(0deg);
                opacity: 1;
            }
            50% {
                transform: perspective(1000px) rotateY(90deg);
                opacity: 0.5;
            }
            55% {
                transform: perspective(1000px) rotateY(90deg);
                opacity: 0.5;
            }
            100% {
                transform: perspective(1000px) rotateY(0deg);
                opacity: 1;
            }
        }

        .card-icon:hover {
            animation: cardFlipFast 0.8s ease-in-out;
        }

        @keyframes cardFlipFast {
            0% {
                transform: perspective(1000px) rotateY(0deg);
            }
            50% {
                transform: perspective(1000px) rotateY(90deg);
            }
            100% {
                transform: perspective(1000px) rotateY(0deg);
            }
        }

        .error-message {
            animation: messageSlideIn 1.5s ease-out;
        }

        @keyframes messageSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-title {
            font-size: 36px;
            font-weight: 600;
            color: #f59e0b;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .error-description {
            font-size: 16px;
            color: #d1d5db;
            line-height: 1.6;
            max-width: 500px;
            margin-bottom: 0.5rem;
        }

        .error-hint {
            font-size: 14px;
            color: #9ca3af;
            font-style: italic;
            margin-top: 1rem;
        }

        .cta-wrapper {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            justify-content: center;
            animation: buttonsFadeIn 2s ease-out;
        }

        @keyframes buttonsFadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn {
            padding: 16px 40px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1.5px;
            border: 2px solid #f59e0b;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-family: inherit;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
            transition: left 0.5s ease-out;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
            color: #050a0f;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #f59e0b;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
        }

        .btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 40px rgba(245, 158, 11, 0.4);
            letter-spacing: 2px;
        }

        .btn:hover::before {
            left: 100%;
        }

        .btn-secondary:hover {
            background: rgba(245, 158, 11, 0.1);
        }

        .btn:active {
            transform: translateY(-1px) scale(0.98);
            box-shadow: 0 5px 20px rgba(245, 158, 11, 0.3);
        }

        .btn-text {
            position: relative;
            z-index: 2;
        }

        .btn-arrow {
            position: relative;
            z-index: 2;
            display: inline-block;
            transition: transform 0.3s ease;
            font-size: 16px;
        }

        .btn:hover .btn-arrow {
            transform: translateX(4px);
        }

        .btn:active .btn-arrow {
            transform: translateX(2px);
        }

        .footer-text {
            font-size: 12px;
            color: #6b7280;
            margin-top: 2rem;
            animation: footerFadeIn 2.4s ease-out;
        }

        @keyframes footerFadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        /* Animation token system */
        :root {
            --duration-fast: 0.15s;
            --duration-base: 0.3s;
            --duration-slow: 0.6s;
            --easing-ease-out: cubic-bezier(0.33, 0.66, 0.66, 1);
            --easing-ease-in-out: cubic-bezier(0.37, 0, 0.63, 1);
            --easing-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --color-primary: #f59e0b;
            --color-primary-light: #fbbf24;
            --color-bg-dark: #050a0f;
        }

        /* Accessibility */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                gap: 1.5rem;
                padding: 1.5rem;
            }

            .error-code {
                font-size: 90px;
            }

            .card-icon {
                font-size: 60px;
            }

            .error-title {
                font-size: 28px;
            }

            .error-description {
                font-size: 14px;
            }

            .cta-wrapper {
                flex-direction: column;
                gap: 0.75rem;
            }

            .btn {
                width: 100%;
                padding: 14px 32px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .error-code {
                font-size: 70px;
            }

            .card-icon {
                font-size: 50px;
            }

            .error-title {
                font-size: 24px;
            }

            .error-code-wrapper {
                gap: 0.5rem;
            }

            .btn {
                padding: 12px 24px;
                font-size: 12px;
                letter-spacing: 1px;
            }
        }

        /* Focus states */
        .btn:focus-visible {
            outline: 2px solid #f59e0b;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Error Code with Card Icon -->
        <div class="error-code-wrapper">
            <div class="error-code">4</div>
            <div class="card-icon">♠</div>
            <div class="error-code">4</div>
        </div>

        <!-- Error Message -->
        <div class="error-message">
            <h1 class="error-title">Oops! Bad Hand</h1>
            <p class="error-description">
                This page has been dealt out of the game. The card you're looking for doesn't exist in our deck.
            </p>
            <p class="error-hint">
                It's not you, it's the hand we were dealt.
            </p>
        </div>

        <!-- Call to Action Buttons -->
        <div class="cta-wrapper">
            <button class="btn btn-primary" onclick="navigateTo('index.html')">
                <span class="btn-text">Back to Home</span>
                <span class="btn-arrow">→</span>
            </button>
            <button class="btn btn-secondary" onclick="navigateTo('ace-environment-dashboard.html')">
                <span class="btn-text">View Dashboard</span>
                <span class="btn-arrow">→</span>
            </button>
        </div>

        <!-- Footer -->
        <div class="footer-text">
            Need help? Contact our support team or return to the main page.
        </div>
    </div>

    <script>
        // Navigation helper
        function navigateTo(page) {
            window.location.href = page;
        }

        // Enhanced card icon interaction
        const cardIcon = document.querySelector('.card-icon');
        let clickCount = 0;

        cardIcon.addEventListener('click', () => {
            clickCount++;
            if (clickCount >= 5) {
                cardIcon.style.animation = 'none';
                setTimeout(() => {
                    cardIcon.style.animation = '';
                }, 10);
                clickCount = 0;
            }
        });

        // Easter egg: Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'h' || e.key === 'H') {
                navigateTo('index.html');
            }
            if (e.key === 'd' || e.key === 'D') {
                navigateTo('ace-environment-dashboard.html');
            }
        });

        // Log animation tokens
        console.log('%c ACE 404 Page - Animation Tokens Active', 'color: #f59e0b; font-size: 14px; font-weight: bold');
        console.log({
            'Card Flip Animation': '2s infinite | 0.8s on hover',
            'Code Shake Animation': '0.6s infinite | 0.4s on hover',
            'Page Load': 'Staggered animations (1.2s - 2.4s)',
            'Keyboard Shortcuts': 'H = Home | D = Dashboard',
            'Easter Egg': 'Click card 5x times for effect'
        });
    </script>
</body>
</html>
